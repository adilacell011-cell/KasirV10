name: Build, push, and deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  # ── Job 1: Build & push both images to GHCR ──────────────────────────────
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: artifacts/api-server/Dockerfile
          - name: web
            dockerfile: artifacts/alfath-pos/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')-${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.img.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: SSH into the server and pull + restart containers ─────────────
  # Requires these GitHub Secrets (Settings → Secrets and variables → Actions):
  #   SERVER_HOST      — IP address or domain name of your VPS
  #   SERVER_USER      — SSH username (e.g. root or ubuntu)
  #   SERVER_SSH_KEY   — contents of your private SSH key (~/.ssh/id_rsa)
  #   DEPLOY_DIR       — folder on the server (e.g. /opt/alfathpos)
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_DIR }}

            # Pull the latest .env-aware images from GHCR
            docker compose -f docker-compose.prod.yml pull

            # Restart only the app containers (db keeps running → no data loss)
            docker compose -f docker-compose.prod.yml up -d --no-deps api web

            # Clean up old dangling images to free disk space
            docker image prune -f
