# AlfathPOS — PRODUCTION deployment via pre-built images from GHCR.
#
# Prerequisites on the server (one-time setup):
#   1. git clone <your-repo> /opt/alfathpos
#   2. cp .env.example .env   →  then edit .env and set your passwords
#   3. echo "GHCR_IMAGE=ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME" >> .env
#      Example: GHCR_IMAGE=ghcr.io/johndoe/alfathpos
#   4. docker compose -f docker-compose.prod.yml up -d
#
# After that, every push to main in GitHub will automatically update the server.
# No manual steps needed — GitHub Actions will SSH in and run the deploy.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alfath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alfath}
      POSTGRES_DB: ${POSTGRES_DB:-alfath}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alfath} -d ${POSTGRES_DB:-alfath}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    image: ${GHCR_IMAGE}-api:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alfath}:${POSTGRES_PASSWORD:-alfath}@db:5432/${POSTGRES_DB:-alfath}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-string}
      PORT: 8080
      NODE_ENV: production

  web:
    image: ${GHCR_IMAGE}-web:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    user: "0:0"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-alfath}
      PGPASSWORD: ${POSTGRES_PASSWORD:-alfath}
      PGDATABASE: ${POSTGRES_DB:-alfath}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-21600}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-14}
    volumes:
      - ./backups:/backups
      - ./docker/db-backup.sh:/db-backup.sh:ro
    entrypoint: ["sh", "/db-backup.sh"]

volumes:
  pgdata:
